<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>InBalance — redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root{
    /* paper + ink — warm, slightly chalky */
    --paper:       oklch(97.8% 0.008 80);
    --paper-2:     oklch(95.5% 0.010 78);
    --paper-3:     oklch(92.8% 0.012 76);
    --ink:         oklch(22%   0.015 70);
    --ink-2:       oklch(38%   0.012 72);
    --ink-3:       oklch(55%   0.010 74);
    --ink-4:       oklch(72%   0.008 76);
    --rule:        oklch(88%   0.012 76);
    --rule-2:      oklch(82%   0.014 76);

    /* phase accents — all chroma 0.08, lightness 55% */
    --menstrual:   oklch(55% 0.11 28);   /* iron rust  */
    --follicular: oklch(60% 0.09 145);  /* sage       */
    --ovulatory:  oklch(62% 0.10 75);   /* ochre      */
    --luteal:     oklch(52% 0.08 320);  /* plum       */

    --accent: var(--luteal);
    --accent-tint: color-mix(in oklch, var(--accent) 14%, var(--paper));
    --accent-ink:  color-mix(in oklch, var(--accent) 75%, var(--ink));

    --serif: "Instrument Serif", "Times New Roman", serif;
    --sans:  "Inter", ui-sans-serif, system-ui, sans-serif;
    --mono:  "JetBrains Mono", ui-monospace, monospace;

    --radius: 2px;
    --radius-l: 6px;

    --phone-shadow-outer: #0d0c0a;
    --phone-shadow-inner: #2b2925;
  }

  /* ---- Palette B · cooler bone + saturated accents ---- */
  body[data-palette="bone"]{
    --paper:     oklch(98% 0.004 95);
    --paper-2:   oklch(95.5% 0.005 95);
    --paper-3:   oklch(92% 0.007 95);
    --ink:       oklch(18% 0.008 260);
    --ink-2:     oklch(34% 0.008 260);
    --ink-3:     oklch(52% 0.007 260);
    --ink-4:     oklch(70% 0.006 260);
    --rule:      oklch(88% 0.006 260);
    --rule-2:    oklch(82% 0.008 260);
    --menstrual: oklch(54% 0.16 22);
    --follicular:oklch(56% 0.14 155);
    --ovulatory: oklch(68% 0.15 78);
    --luteal:    oklch(48% 0.14 310);
  }

  /* ---- Palette C · deep editorial (dark) ---- */
  body[data-palette="deep"]{
    --paper:     oklch(20% 0.012 70);
    --paper-2:   oklch(24% 0.014 70);
    --paper-3:   oklch(28% 0.015 68);
    --ink:       oklch(94% 0.012 80);
    --ink-2:     oklch(80% 0.012 80);
    --ink-3:     oklch(62% 0.010 78);
    --ink-4:     oklch(48% 0.010 76);
    --rule:      oklch(32% 0.014 70);
    --rule-2:    oklch(38% 0.015 70);
    --menstrual: oklch(68% 0.14 28);
    --follicular:oklch(72% 0.12 145);
    --ovulatory: oklch(76% 0.13 78);
    --luteal:    oklch(66% 0.11 318);
    --phone-shadow-outer:#070604;
    --phone-shadow-inner:#1a1714;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{margin:0;padding:0;background:#1a1916;color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
  button{font:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}
  /* app stage */
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;gap:40px}
  .stage-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
  .stage-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:6px}

  /* phone */
  .phone{
    width:390px;height:844px;
    background:var(--paper);
    border-radius:48px;
    border:1px solid #000;
    box-shadow:
      0 0 0 10px var(--phone-shadow-outer),
      0 0 0 11px var(--phone-shadow-inner),
      0 40px 80px -20px rgba(0,0,0,.55);
    overflow:hidden;
    position:relative;
    color:var(--ink);
    display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:20px;z-index:50}
  .status{position:relative;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:16px 28px 4px;font-family:var(--sans);font-weight:500;font-size:13px}
  .status .r{display:flex;gap:6px;align-items:center}
  .status svg{display:block}

  .screen{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scrollbar-width:none}
  .screen::-webkit-scrollbar{display:none}

  /* tab bar */
  .tabs{position:absolute;left:0;right:0;bottom:0;background:color-mix(in oklch, var(--paper) 85%, transparent);backdrop-filter:blur(20px);border-top:1px solid var(--rule);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 12px 28px}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;color:var(--ink-3);font-size:10px;font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
  .tab.active{color:var(--ink)}
  .tab svg{width:20px;height:20px;stroke-width:1.4}
  .tab-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;opacity:0;transition:opacity .2s}
  .tab.active .tab-dot{opacity:1}

  /* typographic primitives */
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
  .display{font-family:var(--serif);font-weight:400;letter-spacing:-.01em;line-height:1.02;color:var(--ink)}
  .serif{font-family:var(--serif);font-weight:400}
  .italic{font-style:italic}
  .label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
  .hairline{height:1px;background:var(--rule);width:100%}
  .hairline-thick{height:1px;background:var(--ink);width:100%}

  /* header */
  .hdr{padding:10px 24px 0;display:flex;justify-content:space-between;align-items:center}
  .hdr .logo{display:flex;align-items:center;gap:8px}
  .hdr .logo-mark{width:22px;height:22px;position:relative;color:var(--ink);display:flex;align-items:center;justify-content:center}
  .hdr .logo-mark svg{width:100%;height:100%;display:block}
  .hdr .brand{font-family:var(--serif);font-size:18px;letter-spacing:.01em}
  .hdr .brand em{font-style:italic;color:var(--accent)}

  .page{padding:18px 24px 120px}

  /* ===== TODAY ===== */
  .today-head{padding-top:6px}
  .today-date{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .today-date .d{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
  .today-date .cd{font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--accent-ink)}

  .phase-card{position:relative;padding:22px 0 28px;border-top:1px solid var(--ink);border-bottom:1px solid var(--rule);margin-bottom:22px}
  .phase-card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
  .phase-card .ph-name{font-family:var(--serif);font-size:44px;line-height:1;color:var(--ink)}
  .phase-card .ph-name em{font-style:italic}
  .phase-card .ph-day{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink-3);margin-top:6px;text-transform:uppercase}
  .phase-card .ph-tag{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--accent-ink);text-transform:uppercase;padding:6px 10px;border:1px solid var(--accent);border-radius:999px;background:var(--accent-tint);white-space:nowrap}
  .phase-card .ph-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .phase-card .prose{margin-top:18px;font-family:var(--serif);font-size:19px;line-height:1.38;color:var(--ink-2);letter-spacing:.005em;text-wrap:pretty}
  .phase-card .prose em{font-style:italic;color:var(--ink)}
  .phase-card .meta{display:flex;gap:20px;margin-top:16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
  .phase-card .meta b{color:var(--ink);font-weight:500}

  /* confidence bar */
  .confidence{margin-top:14px;display:flex;align-items:center;gap:10px}
  .conf-track{flex:1;height:2px;background:var(--rule);position:relative}
  .conf-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent)}
  .conf-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink-3);text-transform:uppercase}

  /* section headers */
  .sec-h{display:flex;justify-content:space-between;align-items:baseline;margin:26px 0 12px}
  .sec-h .t{font-family:var(--serif);font-size:22px;color:var(--ink)}
  .sec-h .t em{font-style:italic}
  .sec-h .a{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}

  /* guidance rows */
  .guide-list{border-top:1px solid var(--rule)}
  .guide-row{display:grid;grid-template-columns:28px 1fr auto;gap:14px;padding:16px 0;border-bottom:1px solid var(--rule);align-items:start}
  .guide-row .num{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-3);padding-top:3px}
  .guide-row .body{display:flex;flex-direction:column;gap:4px}
  .guide-row .kind{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-ink)}
  .guide-row .title{font-family:var(--serif);font-size:19px;line-height:1.2;color:var(--ink)}
  .guide-row .why{font-size:13px;color:var(--ink-3);line-height:1.45;margin-top:2px}
  .guide-row .arrow{color:var(--ink-3);padding-top:4px}

  /* pulse (one-tap check-in) */
  .pulse{margin-top:24px;border:1px solid var(--rule);border-radius:var(--radius-l);padding:18px;background:var(--paper-2)}
  .pulse .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .pulse .q{font-family:var(--serif);font-size:18px}
  .pulse .h .t{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .pulse .opts{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
  .pulse .opt{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--rule-2);border-radius:var(--radius);background:var(--paper);font-family:var(--serif);font-size:20px;color:var(--ink-2);transition:all .15s}
  .pulse .opt:hover{border-color:var(--ink-3)}
  .pulse .opt.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .pulse .legend{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4)}

  /* phase map (today) small */
  .ribbon{margin-top:22px}
  .ribbon-track{display:flex;height:6px;border:1px solid var(--ink);border-radius:3px;overflow:hidden}
  .ribbon-seg{flex:1;position:relative}
  .ribbon-seg.m{background:var(--menstrual)}
  .ribbon-seg.f{background:var(--follicular)}
  .ribbon-seg.o{background:var(--ovulatory)}
  .ribbon-seg.l{background:var(--luteal)}
  .ribbon-seg span{opacity:.35}
  .ribbon-marker{position:absolute;top:-5px;width:2px;height:16px;background:var(--ink)}
  .ribbon-labels{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}

  /* ===== CHECK-IN ===== */
  .ci-hero{padding-top:4px;margin-bottom:22px}
  .ci-hero h1{font-family:var(--serif);font-size:36px;line-height:1.05;margin:8px 0 6px;font-weight:400}
  .ci-hero h1 em{font-style:italic;color:var(--accent-ink)}
  .ci-hero p{color:var(--ink-3);font-size:14px;max-width:30ch}

  .ci-group{padding:18px 0;border-top:1px solid var(--rule)}
  .ci-group.first{border-top:1px solid var(--ink)}
  .ci-group .gh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
  .ci-group .gl{font-family:var(--serif);font-size:20px}
  .ci-group .gs{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:8px 13px;border:1px solid var(--rule-2);border-radius:999px;background:var(--paper);font-size:13px;color:var(--ink-2);transition:all .12s;line-height:1;display:inline-flex;align-items:center;gap:6px}
  .chip:hover{border-color:var(--ink-3)}
  .chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper)}
  .chip.on .dotc{background:var(--paper)}
  .chip .dotc{width:5px;height:5px;border-radius:50%;background:var(--ink-4)}

  /* scale row */
  .scale{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .scale .s{aspect-ratio:1.5/1;display:flex;align-items:center;justify-content:center;border:1px solid var(--rule-2);border-radius:var(--radius);font-family:var(--serif);font-size:18px;color:var(--ink-2)}
  .scale .s.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .scale-legend{display:flex;justify-content:space-between;margin-top:8px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4)}

  .ci-submit{position:sticky;bottom:80px;margin:24px -24px -120px;padding:16px 24px 28px;background:linear-gradient(to top, var(--paper) 60%, transparent);display:flex;gap:10px}
  .btn-primary{flex:1;background:var(--ink);color:var(--paper);padding:16px;border-radius:var(--radius-l);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-ghost{padding:16px 18px;border:1px solid var(--rule-2);border-radius:var(--radius-l);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}

  /* ===== GUIDE ===== */
  .guide-hero{padding-top:4px}
  .guide-hero .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .guide-hero h1{font-family:var(--serif);font-size:32px;line-height:1.05;margin:6px 0 0;font-weight:400}
  .guide-hero h1 em{font-style:italic}

  .plan{margin-top:20px;border-top:1px solid var(--ink)}
  .plan-item{display:grid;grid-template-columns:80px 1fr auto;gap:12px;padding:18px 0;border-bottom:1px solid var(--rule);align-items:center}
  .plan-item .cat{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  .plan-item .cat .sm{display:block;color:var(--accent-ink);margin-top:4px;font-size:9px}
  .plan-item .title{font-family:var(--serif);font-size:20px;line-height:1.2}
  .plan-item .sub{color:var(--ink-3);font-size:12.5px;margin-top:3px;line-height:1.4}
  .plan-item .check{width:22px;height:22px;border-radius:50%;border:1px solid var(--ink);display:flex;align-items:center;justify-content:center;color:transparent;transition:all .18s}
  .plan-item.done .check{background:var(--ink);color:var(--paper)}
  .plan-item.done .title{color:var(--ink-3);text-decoration:line-through;text-decoration-thickness:.5px}

  /* essays / for this phase */
  .essays{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule)}
  .essay{padding:16px 0;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center}
  .essay .img{width:56px;height:56px;background:var(--paper-3);border:1px solid var(--rule);border-radius:var(--radius);position:relative;overflow:hidden}
  .essay .img::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent 0 6px, var(--rule-2) 6px 7px)}
  .essay .img span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:var(--ink-3);letter-spacing:.05em;background:color-mix(in oklch, var(--paper-3) 80%, transparent)}
  .essay .title{font-family:var(--serif);font-size:17px;line-height:1.2}
  .essay .meta{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
  .essay .time{font-family:var(--mono);font-size:10px;color:var(--ink-3)}

  /* ===== CYCLE ===== */
  .cycle-head{padding-top:4px;margin-bottom:14px}
  .cycle-head h1{font-family:var(--serif);font-size:32px;font-weight:400;margin:6px 0 2px;line-height:1.05}
  .cycle-head h1 em{font-style:italic}
  .cycle-head p{color:var(--ink-3);font-size:13px}

  .cyc-ribbon{margin-top:20px;border-top:1px solid var(--ink);padding-top:18px}
  .cyc-ribbon .rb-h{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
  .cyc-ribbon .rb-track{position:relative;height:44px;border-radius:3px;overflow:visible}
  .rb-bg{position:absolute;inset:0;display:flex;border:1px solid var(--ink);border-radius:3px;overflow:hidden}
  .rb-bg .s{height:100%;opacity:.85}
  .rb-bg .s.m{background:var(--menstrual)}
  .rb-bg .s.f{background:var(--follicular)}
  .rb-bg .s.o{background:var(--ovulatory)}
  .rb-bg .s.l{background:var(--luteal)}
  .rb-bg .s span{display:block;padding:6px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--paper);mix-blend-mode:normal}
  .rb-marker{position:absolute;top:-8px;bottom:-8px;width:2px;background:var(--ink);z-index:3}
  .rb-marker::after{content:"";position:absolute;top:-5px;left:-3px;width:8px;height:8px;background:var(--ink);border-radius:50%}
  .rb-fwindow{position:absolute;top:-4px;bottom:-4px;border:1.5px dashed var(--ink);border-radius:3px;z-index:2;background:repeating-linear-gradient(-45deg, transparent 0 4px, color-mix(in oklch, var(--ink) 8%, transparent) 4px 5px)}
  .rb-days{display:flex;justify-content:space-between;margin-top:12px;font-family:var(--mono);font-size:10px;color:var(--ink-3)}

  .pred{border-top:1px solid var(--rule);padding:20px 0;margin-top:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .pred .cell .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase}
  .pred .cell .v{font-family:var(--serif);font-size:24px;margin-top:4px;line-height:1.1}
  .pred .cell .v em{font-style:italic}
  .pred .cell .sub{font-family:var(--mono);font-size:10px;color:var(--ink-3);margin-top:6px;letter-spacing:.06em}

  .stats{border-top:1px solid var(--rule);padding-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:6px}
  .stats .c .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--ink-3);text-transform:uppercase}
  .stats .c .v{font-family:var(--serif);font-size:22px;line-height:1;margin-top:6px}
  .stats .c .t{font-family:var(--mono);font-size:9px;color:var(--ink-4);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

  .patterns{border-top:1px solid var(--rule);padding-top:18px;margin-top:22px}
  .pattern{display:grid;grid-template-columns:48px 1fr auto;gap:12px;padding:12px 0;border-bottom:1px dotted var(--rule);align-items:center}
  .pattern .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent-ink)}
  .pattern .body{font-family:var(--serif);font-size:15px;line-height:1.35;color:var(--ink-2)}
  .pattern .body em{font-style:italic;color:var(--ink)}
  .pattern .d{font-family:var(--mono);font-size:10px;color:var(--ink-3)}

// ---------- Ribbon ----------
function Ribbon({day, small=false}){
  // each phase flex proportional to range
  const segs = PHASES.map(p => ({...p, span: p.end - p.start + 1}));
  const total = CYCLE_LEN;
  const markerPct = ((day-0.5) / total) * 100;

  // fertile window days 12-16
  const fStart = (12-1)/total*100;
  const fEnd   = (16/total)*100;

  return (
    <div className="cyc-ribbon">
      <div className="rb-h">
        <span>Day 1 · last period</span>
        <span>Day {CYCLE_LEN} · next period</span>
      </div>
      <div className="rb-track" style={{position:'relative'}}>
        <div className="rb-bg">
          {segs.map(s => (
            <div key={s.key} className={`s ${s.seg}`} style={{flex:s.span, background:s.color}}>

        <div className="rb-fwindow" style={{left:`${fStart}%`, right:`${100-fEnd}%`}} title="Fertile window"></div>

  );

// ---------- CHECK-IN ----------
function CheckinScreen({day}){
  const ph = phaseForDay(day);
  const [state,setState] = useState({ flow: 0, energy: 3, mood: [], body: [], sleep: null });
  const toggle = (key, val) => setState(s => {
    if (Array.isArray(s[key])) {
      const has = s[key].includes(val);
      return { ...s, [key]: has ? s[key].filter(x=>x!==val) : [...s[key], val] };
    }
    return { ...s, [key]: val };
  });

  return (
    <div className="page fade-in">
      <div className="ci-hero">
        <div className="eyebrow">Daily check-in · {ph.name.toLowerCase()} · day {day}</div>
        <h1>A few quick<br/><em>observations.</em></h1>
        <p>All optional. Whatever you log helps us sharpen the next prediction.</p>
      </div>

      {/* FLOW */}
      <div className="ci-group first">
        <div className="gh"><div className="gl">Flow</div><div className="gs">today</div></div>
        <div className="scale">
          {SYMPTOM_GROUPS[0].items.map((x,i)=>(
            <div key={x} className={`s ${state.flow===i?'on':''}`} onClick={()=>toggle('flow', i)} style={{cursor:'pointer'}}>
              {i===0 ? "—" : "●".repeat(Math.min(i,4))}
            </div>
          ))}
        </div>
        <div className="scale-legend">
          {SYMPTOM_GROUPS[0].items.map(x=><span key={x}>{x}</span>)}
        </div>
      </div>

      {/* ENERGY */}
      <div className="ci-group">
        <div className="gh"><div className="gl">Energy</div><div className="gs">1 to 5</div></div>
        <div className="scale">
          {[1,2,3,4,5].map(n=>(
            <div key={n} className={`s ${state.energy===n?'on':''}`} onClick={()=>toggle('energy', n)} style={{cursor:'pointer'}}>{n}</div>
          ))}
        </div>
        <div className="scale-legend"><span>Depleted</span><span></span><span>Steady</span><span></span><span>Charged</span></div>
      </div>

      {/* MOOD */}
      <div className="ci-group">
        <div className="gh"><div className="gl">Mood</div><div className="gs">tap any</div></div>
        <div className="chips">
          {SYMPTOM_GROUPS[2].items.map(x=>(
            <button key={x} className={`chip ${state.mood.includes(x)?'on':''}`} onClick={()=>toggle('mood', x)}>{x}</button>
          ))}
        </div>
      </div>

      {/* BODY */}
      <div className="ci-group">
        <div className="gh"><div className="gl">Body</div><div className="gs">tap any</div></div>

            <button key={x} className={`chip ${state.body.includes(x)?'on':''}`} onClick={()=>toggle('body', x)}>{x}</button>
          ))}
        </div>
      </div>

      {/* SLEEP */}
      <div className="ci-group">
        <div className="gh"><div className="gl">Sleep</div><div className="gs">last night</div></div>
        <div className="chips">
          {SYMPTOM_GROUPS[4].items.map(x=>(
            <button key={x} className={`chip ${state.sleep===x?'on':''}`} onClick={()=>toggle('sleep', x)}>{x}</button>
          ))}
        </div>
      </div>

      {/* NOTE */}
      <div className="ci-group">
        <div className="gh"><div className="gl">Note</div><div className="gs">optional</div></div>

}

        <div className="t">For this <em>phase</em></div>

// ---------- Phone frame ----------
function Phone({label, children, tab, setTab}){
  return (
    <div className="stage-wrap">
      <div className="stage-label">{label}</div>

// ---------- App ----------
function App(){
  const defaults = JSON.parse(document.getElementById('tweak-defaults').textContent.replace('/*EDITMODE-BEGIN*/','').replace('/*EDITMODE-END*/',''));
  const [tweaks,setTweaks] = useState({ ...defaults });
  const [editMode,setEditMode] = useState(false);
  const [activeTabs,setActiveTabs] = useState({ today:"today", cin:"checkin", guide:"guide", cycle:"cycle" });

  const day = tweaks.cycleDay;

  // apply palette
  useEffect(()=>{
    document.body.setAttribute('data-palette', tweaks.palette || 'warm');
    // sync outer stage background
    const stageBg = tweaks.palette === 'deep' ? '#0a0908' : tweaks.palette === 'bone' ? '#15161b' : '#1a1916';
    document.documentElement.style.background = stageBg;
    document.body.style.background = stageBg;
  },[tweaks.palette]);

  // apply accent
  useEffect(()=>{
    const root = document.documentElement;
    const ph = phaseForDay(day);
    const map = { rust:"var(--menstrual)", sage:"var(--follicular)", ochre:"var(--ovulatory)", plum:"var(--luteal)", ink:"var(--ink)" };
    let v;
    if (tweaks.accent === "phase") v = `var(--${ph.key})`;
    else v = map[tweaks.accent];
    root.style.setProperty('--accent', v);
  },[tweaks.accent, day]);

  // type
  useEffect(()=>{
    const root = document.documentElement;
    const map = {
      instrument: ['"Instrument Serif", "Times New Roman", serif', '"Inter", sans-serif'],
      fraunces: ['"Fraunces", "Times New Roman", serif', '"Inter", sans-serif'],
      plex: ['"IBM Plex Serif", "Times New Roman", serif', '"IBM Plex Sans", "Inter", sans-serif'],
    };
    // lazily load google font
    if (tweaks.type==='fraunces' && !document.getElementById('gf-fr')) {
      const l=document.createElement('link'); l.id='gf-fr'; l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&display=swap';
      document.head.appendChild(l);
    }
    if (tweaks.type==='plex' && !document.getElementById('gf-plex')) {
      const l=document.createElement('link'); l.id='gf-plex'; l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,400;1,400&display=swap';
      document.head.appendChild(l);
    }
    const [s,sn] = map[tweaks.type];
    root.style.setProperty('--serif', s);
    root.style.setProperty('--sans', sn);
  },[tweaks.type]);

  // density
  useEffect(()=>{
    document.body.style.fontSize = tweaks.density==='compact' ? '14px' : '15px';
  },[tweaks.density]);

  // Tweaks panel wiring
  useEffect(()=>{
    const ok = (type)=>type==='__activate_edit_mode'||type==='__deactivate_edit_mode';
    const handler = (e) => {
      if (!e.data || !ok(e.data.type)) return;
      setEditMode(e.data.type==='__activate_edit_mode');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', handler);
  },[]);

  useEffect(()=>{
    const panel = document.getElementById('tweaks');
    panel.classList.toggle('on', editMode);
  },[editMode]);

  // bind tweaks UI
  useEffect(()=>{
    const d = document.getElementById('tw-day');
    const dl = document.getElementById('tw-day-label');
    const setDayLabel = (v)=>{
      const ph = phaseForDay(+v);
      dl.textContent = `Day ${v} · ${ph.name}`;
    };
    d.value = tweaks.cycleDay; setDayLabel(tweaks.cycleDay);
    d.oninput = (e)=>{ const v=+e.target.value; setDayLabel(v); setTweaks(t=>({...t,cycleDay:v})); persist({cycleDay:v}); };

    const wire = (id,key)=>{
      const current = tweaks[key];
      document.querySelectorAll(`#${id} button`).forEach(b=>{
        b.classList.toggle('on', b.dataset.v === current);
        b.onclick=()=>{
          document.querySelectorAll(`#${id} button`).forEach(x=>x.classList.remove('on'));
          b.classList.add('on');
          const v=b.dataset.v;
          setTweaks(t=>({...t,[key]:v}));
          persist({[key]:v});
        };
      });
    };
    wire('tw-accent','accent');
    wire('tw-type','type');
    wire('tw-density','density');
    wire('tw-show','show');
    wire('tw-palette','palette');
  },[]);

  const persist = (edits) => {
    window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*');
  };

  // screens
  const screens = [
    { key:"today",    label:"Today",       tabKey:"today",   render: ()=> <TodayScreen day={day} setTab={(k)=>setActiveTabs(s=>({...s,today:k}))}/> },
    { key:"checkin",  label:"Check-in",    tabKey:"checkin", render: ()=> <CheckinScreen day={day}/> },
    { key:"guide",    label:"Guide",       tabKey:"guide",   render: ()=> <GuideScreen day={day}/> },
    { key:"cycle",    label:"Cycle",       tabKey:"cycle",   render: ()=> <CycleScreen day={day}/> },
    { key:"welcome",  label:"Welcome",     tabKey:null,      render: ()=> <WelcomeScreen/> },
  ];

  const visible = tweaks.show==='all' ? screens : screens.filter(s=>s.key===tweaks.show);

  return (
    <>
      {visible.map(s => (
        <Phone
          key={s.key}
          label={s.label}
          tab={s.tabKey}
          setTab={s.tabKey ? (k)=>{
            setActiveTabs(a=>({...a,[s.key]:k}));
            // jump to that tab's own phone if user clicked
          } : undefined}
        >
          {s.render()}
        </Phone>
      ))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('stage')).render(<App/>);
</script>
</body>
</html>
